# ── Matching checklist ─────────────────────────────────────────────────────
# This is the transparent "checklist" half of the match score. Edit anytime.
# Each job is scored against this and the email shows ✅ / ⚠️ notes per row.

# Target job titles (the job's title is checked for these, case-insensitive).
target_titles:
  - "HR Business Partner"
  - "HRBP"
  - "People Partner"
  - "HR Manager"
  - "Human Resources Business Partner"

# Experience / seniority band in years (read from the job text when stated).
seniority:
  min_years: 4
  max_years: 12

# Skills/keywords you WANT to see in the job (each present = ✅, adds to score).
must_have_skills:
  - "employee relations"
  - "stakeholder"
  - "performance management"
  - "talent"
  - "business partner"

# Nice-to-haves (bonus points, not required).
nice_to_have_skills:
  - "compensation"
  - "org design"
  - "workday"
  - "succession planning"
  - "change management"

# Preferred annual pay floor. Leave 0 to ignore. Best-effort, currency-agnostic.
salary_floor: 0

# ── Dealbreakers (these DROP a job entirely) ───────────────────────────────
# List every country you want to allow. Leave empty to allow all.
allowed_countries:
  - "India"
  - "Qatar"

# Drop jobs whose TITLE contains any of these (case-insensitive).
exclude_titles:
  - "intern"
  - "recruiter"
  - "talent acquisition"
  - "recruitment"
  - "trainee"

# Drop jobs whose text contains any of these keywords.
exclude_keywords:
  - "unpaid"

# Drop jobs from these companies (exact-ish, case-insensitive contains).
exclude_companies: []
